<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0b0c0e] text-[#eef1f4]">  
  <div id="bar" class="fixed top-0 left-0 h-2 w-full bg-[#2ecc71]"></div>

  <main class="min-h-screen grid place-items-center px-[6vw] py-[5vh]">
    <div class="max-w-[1400px] w-full text-center font-[Inter,system-ui,'Segoe UI',Roboto,Arial,sans-serif]">
      <h1 class="text-[clamp(28px,4vw,48px)] font-bold mb-6">Remote</h1>

      
      <div class="flex flex-wrap items-center justify-center gap-3 mb-8">
        <button id="btn-mic-toggle"
          class="text-lg px-4 py-3 rounded-lg bg-emerald-700 text-white border border-emerald-500 hover:bg-emerald-600 active:bg-emerald-800 transition">
          Start Mic
        </button>
        <span id="mic-status" class="text-sm opacity-80">Mic: loading...</span>
        <button id="btn-reading1"
          class="text-lg px-4 py-3 rounded-lg bg-gray-500 text-white border border-gray-600 hover:bg-sky-300 active:bg-black transition">
          Reading 1
        </button>
        <button id="btn-reading2"
          class="text-lg px-4 py-3 rounded-lg bg-gray-500 text-white border border-gray-600 hover:bg-sky-300 active:bg-black transition">
          Reading 2
        </button>
        <button id="btn-gospel"
          class="text-lg px-4 py-3 rounded-lg bg-gray-500 text-white border border-gray-600 hover:bg-sky-300 active:bg-black transition">
          Gospel
        </button>
        <button id="btn-clear"
          class="text-lg px-4 py-3 rounded-lg bg-gray-500 text-white border border-gray-600 hover:bg-sky-300 active:bg-black transition">
          Clear Screen
        </button>
      </div>

      <div class="mx-auto mb-8 w-full max-w-[720px] rounded-lg border border-white/10 bg-[#15181d] p-4 text-left">
        <div class="mb-2 text-sm font-semibold">Microphone Diagnostics</div>
        <div class="mb-1 text-xs opacity-80">Backend: <span id="backend-status">waiting...</span></div>
        <div class="mb-1 text-xs opacity-80">Live Partial: <span id="partial-text">(none)</span></div>
        <div class="mb-1 text-xs font-semibold opacity-90">Final Transcript</div>
        <div id="transcript-log" class="max-h-40 overflow-y-auto whitespace-pre-wrap rounded bg-[#10141a] p-2 text-xs leading-relaxed opacity-90">(none)</div>
      </div>

      <h3 class="text-[clamp(20px,2.5vw,28px)] font-semibold opacity-80 mb-4">
        For Custom Text Onscreen
      </h3>
      <div class="mx-auto w-1/2 min-w-[280px] max-w-[720px]">
        <input id="title" placeholder="Title"
          class="w-full mb-3 px-3 py-2 text-base rounded-md bg-[#222] text-white placeholder-white/60 border border-white/10 focus:outline-none focus:ring-2 focus:ring-sky-400" />
        <textarea id="text" rows="4" placeholder="Main text to show"
          class="w-full mb-4 px-3 py-2 text-base rounded-md bg-[#222] text-white placeholder-white/60 border border-white/10 focus:outline-none focus:ring-2 focus:ring-sky-400"></textarea>

        <button id="btn-send"
          class="text-lg px-4 py-3 rounded-lg bg-gray-500 text-white border border-gray-600 hover:bg-sky-300 active:bg-black transition">
          Send
        </button>
        <span id="send-status" class="ml-3 text-sm opacity-70"></span>
      </div>
    </div>
  </main>

  <script>
    let ws;
    let micStreaming = false;
    let sendStatusTimer;
    let transcriptLines = [];

    const micToggleButton = document.getElementById('btn-mic-toggle');
    const micStatus = document.getElementById('mic-status');
    const backendStatus = document.getElementById('backend-status');
    const partialText = document.getElementById('partial-text');
    const transcriptLog = document.getElementById('transcript-log');
    const titleInput = document.getElementById('title');
    const textInput = document.getElementById('text');
    const sendButton = document.getElementById('btn-send');
    const sendStatus = document.getElementById('send-status');

    function connectWebSocket() {
      ws = new WebSocket(`ws://${location.host}/ws`);
      ws.onopen  = () => {
        send({ cmd: "mic_status" });
      };
      ws.onclose = () => {
        setTimeout(connectWebSocket, 2000);
      };
      ws.onmessage = (event) => {
        try {
          const message = JSON.parse(event.data);
          if (message.cmd === "mic_state") {
            applyMicState(message.title || "unknown", message.text || "");
          } else if (message.cmd === "mic_backend") {
            applyBackendState(message.title || "unknown", message.text || "");
          } else if (message.cmd === "mic_detect") {
            applyMicDetect(message.title || "unknown", message.text || "");
          }
        } catch (error) {
          console.warn("Failed to parse WS message", error);
        }
      };
      ws.onerror = () => {
        // Optionally handle errors, but reconnection is handled in onclose
      };
    }
    connectWebSocket();

    function applyMicState(state, detail) {
      if (state === "streaming") {
        micStreaming = true;
        micToggleButton.textContent = "Stop Mic";
        micToggleButton.className = "text-lg px-4 py-3 rounded-lg bg-red-700 text-white border border-red-500 hover:bg-red-600 active:bg-red-800 transition";
      } else {
        micStreaming = false;
        micToggleButton.textContent = "Start Mic";
        micToggleButton.className = "text-lg px-4 py-3 rounded-lg bg-emerald-700 text-white border border-emerald-500 hover:bg-emerald-600 active:bg-emerald-800 transition";
      }

      const label = state || "unknown";
      micStatus.textContent = detail ? `Mic: ${label} - ${detail}` : `Mic: ${label}`;
    }

    function applyBackendState(state, detail) {
      const normalizedState = state || "unknown";
      let label = normalizedState;

      if (normalizedState === "model_pending") {
        label = "model_not_loaded";
      }

      backendStatus.textContent = detail ? `${label} - ${detail}` : label;
    }

    function applyMicDetect(kind, text) {
      if (!text) {
        return;
      }

      if (kind === "partial") {
        partialText.textContent = text;
        return;
      }

      partialText.textContent = "(none)";
      transcriptLines.push(text);
      if (transcriptLines.length > 10) {
        transcriptLines = transcriptLines.slice(-10);
      }
      transcriptLog.textContent = transcriptLines.length > 0 ? transcriptLines.join("\n") : "(none)";
    }

    function send(payload) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(payload));
      } else {
        console.warn("WebSocket not connected, cannot send:", payload);
      }
    }

    function flashSendStatus(message) {
      clearTimeout(sendStatusTimer);
      sendStatus.textContent = message;
      sendStatusTimer = setTimeout(() => {
        sendStatus.textContent = "";
      }, 1200);
    }

    function sendCustomText() {
      const title = titleInput.value.trim();
      const text = textInput.value.trim();

      if (!title && !text) {
        flashSendStatus("Nothing to send");
        textInput.focus();
        return;
      }

      send({ cmd: "set", title, text });
      titleInput.value = "";
      textInput.value = "";
      textInput.focus();
      flashSendStatus("Sent");
    }

    micToggleButton.onclick = () => {
      send({ cmd: micStreaming ? "mic_stop" : "mic_start" });
    };

    document.getElementById('btn-reading1').onclick = () => {
      send({ cmd: "show", title: "Reading 1" });
    };
    document.getElementById('btn-reading2').onclick = () => {
      send({ cmd: "show", title: "Reading 2" });
    };
    document.getElementById('btn-gospel').onclick = () => {
      send({ cmd: "show", title: "Gospel" });
    };
    document.getElementById('btn-clear').onclick = () => {
      send({ cmd: "clear" });
    };

    sendButton.onclick = () => {
      sendCustomText();
    };

    titleInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        sendCustomText();
      }
    });

    textInput.addEventListener("keydown", (event) => {
      const isEnter = event.key === "Enter";
      const wantsNewline = event.shiftKey;
      const shortcutSend = (event.ctrlKey || event.metaKey) && isEnter;

      if (shortcutSend) {
        event.preventDefault();
        sendCustomText();
        return;
      }

      if (isEnter && !wantsNewline) {
        event.preventDefault();
        sendCustomText();
      }
    });

    setInterval(() => {
      send({ cmd: "mic_status" });
    }, 5000);

  </script>
</body>
</html>
